name: Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run build && npx electron-builder --publish always --win nsis --x64

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Exile-Build-PoE-installer-x64
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
          retention-days: 14
