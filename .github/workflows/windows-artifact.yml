name: Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installer
        run: npm run dist:win

      - name: Prepare stable release assets
        shell: pwsh
        run: |
          $webReleaseDir = Join-Path "release" "nsis-web"
          if (-not (Test-Path $webReleaseDir)) {
            throw "NSIS web output directory not found: $webReleaseDir"
          }

          $installer = Get-ChildItem -Path $webReleaseDir -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*__uninstaller*" } |
            Select-Object -First 1
          if (-not $installer) {
            throw "Web installer .exe not found in $webReleaseDir"
          }
          Copy-Item $installer.FullName "release/BuildPilot-PoE-Installer.exe" -Force

          $package = Get-ChildItem -Path $webReleaseDir -Filter "*.nsis.7z" | Select-Object -First 1
          if (-not $package) {
            throw "NSIS web package not found in $webReleaseDir"
          }

          Copy-Item $package.FullName "release/BuildPilot-PoE-Web-Package-x64.nsis.7z" -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuildPilot-PoE-web-installer-x64
          path: |
            release/BuildPilot-PoE-Installer.exe
            release/BuildPilot-PoE-Web-Package-x64.nsis.7z
          if-no-files-found: error
          retention-days: 14

      - name: Publish installer to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "windows-installer-latest"
          $notes = @"
          Latest Windows installer built from `main`.

          Commit: $env:GITHUB_SHA
          Workflow run: https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID
          "@

          git tag -f $tag $env:GITHUB_SHA
          git push --force origin "refs/tags/$tag"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag "release/BuildPilot-PoE-Installer.exe" "release/BuildPilot-PoE-Web-Package-x64.nsis.7z" --clobber
            gh release edit $tag --title "BuildPilot PoE Windows Installer" --notes $notes
          } else {
            gh release create $tag "release/BuildPilot-PoE-Installer.exe" "release/BuildPilot-PoE-Web-Package-x64.nsis.7z" --title "BuildPilot PoE Windows Installer" --notes $notes
          }
