name: Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Windows installer
        run: npm run dist:win

      - name: Prepare stable release assets
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*__uninstaller*" } |
            Select-Object -First 1
          if (-not $installer) {
            throw "Offline installer .exe not found in release/"
          }
          Copy-Item $installer.FullName "release/BuildPilot-PoE-Setup.exe" -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuildPilot-PoE-installer-x64
          path: release/BuildPilot-PoE-Setup.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish installer to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $tag = "windows-installer-v$version-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          $notes = @"
          Windows installer build from `main`.

          Commit: $env:GITHUB_SHA
          Workflow run: https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID
          "@

          gh release create $tag "release/BuildPilot-PoE-Setup.exe" --title "BuildPilot PoE Windows Installer $version" --notes $notes --latest
